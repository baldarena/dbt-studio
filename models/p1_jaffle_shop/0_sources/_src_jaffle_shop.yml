sources:
  - name: jaffle_shop
    description: "raw data from jaffle shop postgres database"
    database: phb-raw-zone
    schema: jaffle_shop  
    tables:

      - name: orders
        description: "raw data from orders"
        columns:
          - name: id
            description: "{{doc('pk_id_order')}}"
            tests:
              - unique
              - not_null
          - name: user_id
            description: "{{doc('fk_id_customer')}}"
          - name: order_date
            description: "{{doc('dt_order')}}"
          - name: status
            description: "{{doc('order_status')}}"
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 24, period: hour}

      - name: customers
        description: "raw data from customers"
        columns:
          - name: id
            description: "{{doc('pk_id_customer')}}"
            tests:
              - unique
              - not_null
          - name: first_name
            description: "{{doc('first_name')}}"
          - name: last_name
            description: "{{doc('last_name')}}"